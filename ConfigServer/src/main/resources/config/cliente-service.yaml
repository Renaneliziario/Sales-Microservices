server:
  port: 8081
  wait-time-in-ms-when-sync-empty: 3000

spring:
  data:
    mongodb:
      #uri: mongodb://127.0.0.1:27017/cliente
      host: ${MONGODB_URL}
      database: cliente
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

application-version: 1.0