server:
  port:9091
eureka:
  instance:
    hostname: localhost
  client:
    registereWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 3000
loggin.level:
  org.springframework.retry: trace
  com.netflix.discovery: trace