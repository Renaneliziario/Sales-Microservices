application.version=1.0.0
spring.application.name=venda-service
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.username=root
spring.cloud.config.password=${CONFIG_PASSWORD:root}
services.produto.url=http://localhost:8082
services.cliente.url=http://localhost:8081

feign.circuitbreaker.enabled=true
feign.client.config.produto-service.connect-timeout=5000
feign.client.config.produto-service.read-timeout=10000
